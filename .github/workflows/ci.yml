name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: cp amplify_outputs.ci.json amplify_outputs.json
      - run: npx tsc --noEmit
      - run: npm run test:run
      - run: npm run build

  ci-pass:
    name: CI Pass
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "All CI checks passed!"
